{% extends "layout.html" %}

{% block main %}
<h1 class="mb-4">Quote</h1>

<div class="card">
    <div class="card-body">
        <h5 class="card-title">{{ quote.name }} ({{ quote.symbol }})</h5>
        <p class="card-text h3">{{ quote.price | usd }}</p>
    </div>
</div>

<div class="mt-4">
    <a href="/quote" class="btn btn-secondary">Get Another Quote</a>
    <a href="/buy" class="btn btn-primary">Buy This Stock</a>
</div>
{% endblock %}
