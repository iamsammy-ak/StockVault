{% extends "layout.html" %}

{% block title %}
    Profile
{% endblock %}

{% block main %}
<h1 class="mb-4">Profile</h1>

<div class="row">
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">User Information</h5>
                <form action="/profile" method="post">
                    <div class="mb-3">
                        <label for="display_name" class="form-label">Display Name</label>
                        <input type="text" class="form-control" id="display_name" name="display_name" value="{{ profile.display_name }}">
                    </div>
                    <div class="mb-3">
                        <label for="bio" class="form-label">Bio</label>
                        <textarea class="form-control" id="bio" name="bio" rows="3">{{ profile.bio }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">Settings</h5>
                <form action="/profile/settings" method="post">
                    <div class="mb-3">
                        <label for="theme" class="form-label">Theme</label>
                        <select class="form-select" id="theme" name="theme">
                            <option value="light" {% if profile.theme == 'light' %}selected{% endif %}>Light</option>
                            <option value="dark" {% if profile.theme == 'dark' %}selected{% endif %}>Dark</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="notifications" name="notifications" {% if profile.notifications_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="notifications">Enable Notifications</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Save Settings</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div class="card mt-4">
  <div class="card-body text-center">
    <h5 class="card-title">Account Balance</h5>
    <p class="card-text h4 mb-3">{{ user.cash | format_currency(profile.currency) }}</p>
    <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addMoneyModal">
      <i class="fas fa-plus-circle me-2"></i>Add Money
    </button>
  </div>
</div>

<!-- Add Money Modal -->
<div class="modal fade" id="addMoneyModal" tabindex="-1" aria-labelledby="addMoneyModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="addMoneyModalLabel">Add Money to Account</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <form action="/add_cash" method="post">
        <div class="modal-body">
          <div class="mb-3">
            <label for="amount" class="form-label">Amount</label>
            <input type="number" class="form-control" id="amount" name="amount" min="1" step="0.01" required placeholder="Enter amount to add">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-success">Add Money</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
